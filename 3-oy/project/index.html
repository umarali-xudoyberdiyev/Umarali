<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List (Umarali)</title>
    <link rel="stylesheet" href="main.css" />
  </head>

  <body>
    <div class="app">
      <header class="app-header">
        <div class="brand">
          <div class="logo" aria-hidden="true">✓</div>
          <div>
            <h1 class="title">Todo List</h1>
            <p class="subtitle">Vanilla JS + API (paginated)</p>
          </div>
        </div>

        <div class="header-actions">
          <button class="btn btn-ghost" type="button" data-action="refresh">
            Refresh
          </button>
          <button
            class="btn btn-primary"
            type="button"
            data-action="open-create"
          >
            + New todo
          </button>
        </div>
      </header>

      <main class="card">
        <section class="controls">
          <div class="search">
            <span class="icon" aria-hidden="true">⌕</span>
            <input
              type="search"
              placeholder="Search by title..."
              aria-label="Search todo by title"
              data-field="search"
            />
          </div>

          <div class="filters">
            <div class="segmented" role="tablist" aria-label="Todo filters">
              <button class="seg-btn is-active" type="button" data-filter="all">
                All
              </button>
              <button class="seg-btn" type="button" data-filter="active">
                Active
              </button>
              <button class="seg-btn" type="button" data-filter="completed">
                Completed
              </button>
            </div>

            <select class="select" aria-label="Sort" data-field="sort">
              <option value="newest">Newest</option>
              <option value="oldest">Oldest</option>
              <option value="az">A → Z</option>
              <option value="za">Z → A</option>
            </select>
          </div>
        </section>

        <section class="create">
          <form class="create-form" data-form="create">
            <div class="field">
              <label for="todoTitle">Title</label>
              <input
                id="todoTitle"
                name="title"
                type="text"
                placeholder="Masalan: Express TODO API yozish"
                autocomplete="off"
              />
            </div>

            <div class="field">
              <label for="todoDesc">Description</label>
              <textarea
                id="todoDesc"
                name="description"
                rows="2"
                placeholder="Qisqacha izoh..."
              ></textarea>
            </div>

            <div class="create-actions">
              <button
                class="btn btn-primary"
                type="submit"
                data-action="create"
                id="addTodo"
              >
                Add
              </button>
              <button
                class="btn btn-ghost"
                type="reset"
                data-action="reset-form"
              >
                Clear
              </button>
            </div>
          </form>

          <div class="stats" aria-live="polite">
            <div class="pill">
              <span class="dot dot-blue" aria-hidden="true"></span>
              <span>Total:</span>
              <strong data-stat="count" id="total">0</strong>
            </div>
            <div class="pill">
              <span class="dot dot-green" aria-hidden="true"></span>
              <span>Done:</span>
              <strong data-stat="done">0</strong>
            </div>
            <div class="pill">
              <span class="dot dot-orange" aria-hidden="true"></span>
              <span>Active:</span>
              <strong data-stat="active">0</strong>
            </div>
          </div>
        </section>

        <section class="list-wrap">
          <ul class="todo-list" data-list="todos"></ul>

          <div class="empty" hidden data-state="empty">
            <div class="empty-emoji" aria-hidden="true">📭</div>
            <h3>Hali todo yo'q</h3>
            <p>Yangi todo qo'shing yoki API'dan olib keling.</p>
          </div>
        </section>

        <footer class="pager">
          <button
            class="btn btn-ghost"
            type="button"
            data-action="prev"
            disabled
          >
            ← Prev
          </button>
          <div class="page-info">
            <span>Page</span>
            <strong data-page="current">1</strong>
            <span>/</span>
            <strong data-page="total">1</strong>
          </div>
          <button
            class="btn btn-ghost"
            type="button"
            data-action="next"
            disabled
          >
            Next →
          </button>
        </footer>
      </main>

      <footer class="app-footer">
        <small
          >Tip: elementlarga <code>data-*</code> qo'yilgan — JS bilan ulash
          oson.</small
        >
      </footer>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
