<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List — JS Amaliyot</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="./main.css" />
  </head>
  <body class="bg-light">
    <div class="container my-5" style="max-width: 550px">
      <div class="card shadow-sm p-4">
        <h2 class="text-center mb-4 text-primary">Todo List</h2>

        <form id="form-create" class="mb-4">
          <div class="input-group">
            <input
              type="text"
              id="input-create"
              name="input-create"
              class="form-control"
              placeholder="Yangi vazifa kiriting..."
              autocomplete="off"
            />
            <button class="btn btn-primary" type="submit">Qo'shish</button>
          </div>
          <div id="message-create" class="text-danger small mt-2 fw-bold"></div>
        </form>

        <ul id="list-group-todo" class="list-group"></ul>
      </div>
    </div>

    <div id="overlay" class="hidden"></div>

    <div id="modal" class="hidden shadow-lg">
      <div
        class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2"
      >
        <h5 class="m-0 text-success">Vazifani tahrirlash</h5>
        <button id="close" class="btn-close" type="button"></button>
      </div>
      <form id="form-edit">
        <div class="mb-3">
          <label for="input-edit" class="form-label small text-muted"
            >Yangi matnni kiriting:</label
          >
          <input
            type="text"
            id="input-edit"
            name="input-edit"
            class="form-control"
            autocomplete="off"
            required
          />
        </div>
        <button type="submit" class="btn btn-success w-100">
          O'zgarishlarni saqlash
        </button>
      </form>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
